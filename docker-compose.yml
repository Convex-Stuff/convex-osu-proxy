services:
  convex-osu-proxy:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - OTEL_SERVICE_NAME=convex-osu-proxy
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
    networks:
      - default
      - observability
networks:
  observability:
    external: true
